level             = "hard"
name              = "particle_decay_chain"
tags              = ["physics", "experiments", "dfs"]
time_to_solve_sec = 760

description_en = """
Particle decay rules are strings like `"Higgs->photon+photon"`.
This means one `Higgs` particle may be replaced by one `photon` and another `photon`.

Starting from `start`, apply any number of rules to any current particle.
Return `true` if you can finish with exactly the particles from `target`.
Order does not matter, but duplicates do. A particle with no rule simply remains stable.
"""

description_ru = """
Правила распада частиц заданы строками вида `"Higgs->photon+photon"`.
Это значит, что одну частицу `Higgs` можно заменить на две частицы `photon`.

Начиная с `start`, применяйте любое число правил к любым текущим частицам.
Верните `true`, если можно закончить ровно с частицами из `target`.
Порядок не важен, но повторы важны. Частица без правила просто остаётся стабильной.
"""

limits = """
- $0 \\leq \\text{len}(\\text{rules}) \\leq 30$
- $1 \\leq \\text{len}(\\text{target}) \\leq 12$
- $1 \\leq \\text{len}(\\text{particle}) \\leq 20$
"""

solution = """
def solution(rules, start, target):
    decays = {}
    for rule in rules:
        parent, children = rule.split("->")
        decays.setdefault(parent, []).append(children.split("+"))
    goal, seen = tuple(sorted(target)), set()
    def can(state):
        state = tuple(sorted(state))
        if state == goal:
            return True
        if state in seen or len(state) > len(goal):
            return False
        seen.add(state)
        for i, particle in enumerate(state):
            for children in decays.get(particle, []):
                if can(list(state[:i]) + children + list(state[i + 1:])):
                    return True
        return False
    return can([start])
"""

examples = """
solution([], "electron", ["electron"]) == True
solution(["Higgs->photon+photon"], "Higgs", ["photon", "photon"]) == True
solution(["A->B+C", "B->D+E"], "A", ["C", "D", "E"]) == True
"""

