level             = "easy"
name              = "higgs_candidate_events"
tags              = ["physics", "experiments", "arrays"]
time_to_solve_sec = 220

description_en = """
In a simplified Higgs search, each collision event has a reconstructed mass in GeV.

Return the indices of all events whose mass lies in the candidate window from `120` to `130`, inclusive.
"""

description_ru = """
В упрощённом поиске бозона Хиггса у каждого события есть реконструированная масса в ГэВ.

Верните индексы всех событий, масса которых попадает в окно кандидата от `120` до `130` включительно.
"""

limits = """
- $0 \\leq \\text{len}(\\text{masses}) \\leq 100$
- $0 \\leq \\text{mass} \\leq 300$
"""

solution = """
def solution(masses):
    return [i for i, m in enumerate(masses) if 120 <= m <= 130]
"""

examples = """
solution([]) == []
solution([125]) == [0]
solution([119, 120, 130, 131]) == [1, 2]
"""

[[input_signature]]
argument_name = "masses"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[output_signature.type]
name = "array"
[output_signature.type.nested]
name = "integer"

