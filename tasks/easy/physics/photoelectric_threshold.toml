level             = "easy"
name              = "photoelectric_threshold"
tags              = ["physics", "experiments", "arrays"]
time_to_solve_sec = 220

description_en = """
In the photoelectric effect, a photon ejects an electron only if its energy reaches the metal work function.

Given photon energies and the work function, return how many photons can eject electrons.
"""

description_ru = """
В фотоэффекте фотон выбивает электрон только тогда, когда его энергия достигает работы выхода металла.

Даны энергии фотонов и работа выхода. Верните количество фотонов, способных выбить электроны.
"""

limits = """
- $0 \\leq \\text{len}(\\text{energies}) \\leq 100$
- $0 \\leq \\text{energy} \\leq 10^4$
- $0 \\leq \\text{work\\_function} \\leq 10^4$
"""

solution = """
def solution(energies, work_function):
    return sum(e >= work_function for e in energies)
"""

examples = """
solution([], 5) == 0
solution([5], 5) == 1
solution([2, 5, 7, 1], 5) == 2
"""

[[input_signature]]
argument_name = "energies"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[[input_signature]]
argument_name = "work_function"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "integer"

[[asserts]]
arguments = [[], 5]
comment   = "No photons"
expected  = 0

[[asserts]]
