level             = "easy"
name              = "galileo_fall_matches"
tags              = ["physics", "experiments", "arrays"]
time_to_solve_sec = 220

description_en = """
In a simplified Galileo fall experiment each record is `[mass1, height1, mass2, height2]`.

In ideal vacuum, fall time depends only on height, not mass.
Return how many records describe bodies that land at the same time.
"""

description_ru = """
В упрощённом опыте Галилея каждая запись имеет вид `[mass1, height1, mass2, height2]`.

В идеальном вакууме время падения зависит только от высоты, а не от массы.
Верните количество записей, где тела приземлятся одновременно.
"""

limits = """
- $0 \\leq \\text{len}(\\text{experiments}) \\leq 100$
- $1 \\leq \\text{mass1}, \\text{mass2} \\leq 10^4$
- $0 \\leq \\text{height1}, \\text{height2} \\leq 10^4$
"""

solution = """
def solution(experiments):
    return sum(e[1] == e[3] for e in experiments)
"""

examples = """
solution([]) == 0
solution([[1, 10, 5, 10]]) == 1
solution([[1, 10, 5, 9], [3, 7, 8, 7]]) == 1
"""

[[input_signature]]
argument_name = "experiments"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "array"
[input_signature.type.nested.nested]
name = "integer"

[output_signature.type]
