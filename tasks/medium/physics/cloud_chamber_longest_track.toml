level             = "medium"
name              = "cloud_chamber_longest_track"
tags              = ["physics", "experiments", "graphs"]
time_to_solve_sec = 420

description_en = """
A Wilson cloud chamber image is represented by a `15 x 15` grid.

Each `"*"` cell is part of a visible particle track, and `"."` is empty space.
Return the size of the largest connected track, where cells are connected in all `8` directions.
"""

description_ru = """
Снимок камеры Вильсона задан сеткой `15 x 15`.

Каждая клетка `"*"` — часть видимого следа частицы, а `"."` — пустое место.
Верните размер самого большого связного следа, где клетки соединяются во всех `8` направлениях.
"""

limits = """
- $\\text{len}(\\text{chamber}) = 15$
- $\\text{len}(\\text{row}) = 15$
- $\\text{row} \\in \\{., *\\}^{15}$
"""

solution = """
def solution(chamber):
    seen, best = set(), 0
    for r, row in enumerate(chamber):
        for c, v in enumerate(row):
            if v == "*" and (r, c) not in seen:
                stack, size = [(r, c)], 0
                seen.add((r, c))
                while stack:
                    x, y = stack.pop()
                    size += 1
                    for dx in (-1, 0, 1):
                        for dy in (-1, 0, 1):
                            nx, ny = x + dx, y + dy
                            if (dx or dy) and 0 <= nx < len(chamber) and 0 <= ny < len(chamber[nx]) and chamber[nx][ny] == "*" and (nx, ny) not in seen:
                                seen.add((nx, ny)); stack.append((nx, ny))
                best = max(best, size)
    return best
"""

